#ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  config.json: |
    {
      "message": "Bonjour Florent ! v2.5"
    }
---
#Secret
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  DB_USER: dGhpYmF1bHQ=
  DB_PASSWORD: dGhpYno=
---
#Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: application
        image: genessy/tp-k8s:v1
        ports:
        - containerPort: 3000
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
        envFrom:
        - configMapRef:
            name: app-config
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: app-config
---
#Service
apiVersion: v1
kind: Service
metadata:
  name: node-app-service
spec:
  type: LoadBalancer 
  selector:
    app: node-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000